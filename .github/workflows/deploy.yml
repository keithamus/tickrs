name: deploy
on:
  workflow_run:
    workflows: [test]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    if: |
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.ref_name == 'main'
        )
      }}
    name: Build release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup
        uses: ./.github/actions/setup
        with:
          key: release
      - name: Build database
        run: sqlite3 db.sqlite3 < create.sql
      - name: Build release binary
        run: cargo build --release
      - name: Upload binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: tickrs
          path: |
            target/release/tickrs
          if-no-files-found: error

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: tickrs
          path: artifacts/
      - name: Install WireGuard
        run: sudo apt-get update && sudo apt-get install -y wireguard
      - name: Connect to WireGuard
        run: |
          sudo ip link add dev wg0 type wireguard
          sudo ip address add dev wg0 10.10.10.204 peer 10.10.10.100
          echo "${{ secrets.WIREGUARD_PRIVATE_KEY }}" > privatekey
          sudo wg set wg0 \
            listen-port 51821 \
            private-key privatekey \
            peer "${{ secrets.WIREGUARD_PEER_PUBLIC_KEY }}" \
            allowed-ips 10.10.10.0/24 \
            endpoint "${{ secrets.WIREGUARD_PEER_ENDPOINT }}"
          rm privatekey
          sudo ip link set up dev wg0
          sudo wg
          ping -c1 10.10.10.100
      - name: Upload to server
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.ARTIFACT_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 22 10.10.10.100 >> ~/.ssh/known_hosts
          chmod +x artifacts/tickrs
          rsync -zp artifacts/tickrs tickrs@10.10.10.100:/opt/tickrs/
